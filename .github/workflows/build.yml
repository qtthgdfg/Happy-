name: Build Kivy Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            python3-pip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            unzip \
            wget

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Clean cached Android platform
        run: rm -rf /home/runner/.buildozer/android/platform

      - name: Create SDK directories and accept licenses
        run: |
          SDK_ROOT="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_ROOT/licenses"
          LICENSES=(
            "android-sdk-license"
            "android-googletv-license"
            "android-sdk-preview-license"
            "google-gdk-license"
            "mips-android-sysimage-license"
            "android-sdk-arm-dbt-license"
            "android-wear-sdk-license"
            "android-wear-preview-license"
            "android-sdk-license-c81a61d9"
            "android-dtb-license"
            "android-tv-sdk-license"
          )
          for license in "${LICENSES[@]}"; do
            echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" > "$SDK_ROOT/licenses/$license"
          done
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV

      - name: Build APK with Buildozer
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: bin/*.apk
