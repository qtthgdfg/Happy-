name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (Multi-Arch)
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.12'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3-dev python3-pip \
            libffi-dev libssl-dev liblzma-dev \
            autoconf automake autotools-dev libtool libtool-bin \
            cmake pkg-config zip unzip wget curl \
            openjdk-17-jdk libncurses-dev libtinfo5 \
            libsqlite3-dev libreadline-dev libbz2-dev \
            libgdbm-dev zlib1g-dev
      
      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install "cython<3.0,>=0.29.33"
          python3 -m pip install buildozer==1.5.0 virtualenv
      
      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          
          mkdir -p cmdline-tools/latest
          if [ -d "cmdline-tools/bin" ]; then
            mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          fi
          
          mkdir -p tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/*
          
          mkdir -p licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > licenses/android-sdk-license
          
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            2>/dev/null || true
          
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
      
      - name: Download NDK 23 with fallback
        id: ndk
        run: |
          NDK_BASE="$HOME/.buildozer/android/platform"
          mkdir -p "$NDK_BASE"
          
          NDK_VERSIONS=("r23b" "r23c" "r23")
          DOWNLOADED=false
          
          for NDK_NAME in "${NDK_VERSIONS[@]}"; do
            NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_NAME}-linux.zip"
            NDK_ZIP="/tmp/android-ndk-${NDK_NAME}.zip"
            
            echo "Trying: $NDK_URL"
            
            HTTP_CODE=$(curl -sL -o "$NDK_ZIP" -w "%{http_code}" "$NDK_URL")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Downloaded"
              TEMP_EXTRACT="/tmp/ndk-extract-${NDK_NAME}"
              rm -rf "$TEMP_EXTRACT"
              mkdir -p "$TEMP_EXTRACT"
              unzip -q -o "$NDK_ZIP" -d "$TEMP_EXTRACT"
              rm -f "$NDK_ZIP"
              
              ACTUAL_NDK=$(find "$TEMP_EXTRACT" -maxdepth 2 -name "ndk-build" -type f 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
              
              if [ -n "$ACTUAL_NDK" ] && [ -f "$ACTUAL_NDK/ndk-build" ]; then
                FINAL_DIR="$NDK_BASE/android-ndk-r23b"
                rm -rf "$FINAL_DIR"
                mv "$ACTUAL_NDK" "$FINAL_DIR"
                rm -rf "$TEMP_EXTRACT"
                
                echo "ndk-path=$FINAL_DIR" >> $GITHUB_OUTPUT
                echo "ndk-name=${NDK_NAME}" >> $GITHUB_OUTPUT
                DOWNLOADED=true
                break
              fi
              rm -rf "$TEMP_EXTRACT"
            else
              echo "❌ HTTP $HTTP_CODE"
              rm -f "$NDK_ZIP"
            fi
          done
          
          if [ "$DOWNLOADED" = false ]; then
            echo "❌ All NDK 23 versions unavailable"
            exit 1
          fi
          
          echo "✅ NDK ${{ steps.ndk.outputs.ndk-name }} ready"
      
      - name: Clean old buildozer cache
        run: |
          rm -rf ~/.buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf .buildozer 2>/dev/null || true
          echo "Cleaned old build cache"
      
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('buildozer.spec', 'main.py', 'service.py') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v4-
      
      - name: Verify required files exist
        run: |
          echo "=== Checking required files ==="
          if [ -f "main.py" ]; then 
            echo "✅ main.py found ($(wc -l < main.py) lines)"
          else 
            echo "❌ main.py MISSING"
            exit 1
          fi
          if [ -f "service.py" ]; then 
            echo "✅ service.py found ($(wc -l < service.py) lines)"
          else 
            echo "❌ service.py MISSING"
            exit 1
          fi
          echo "=== Files in repository ==="
          ls -la
      
      - name: Build Multi-Arch APK
        id: build
        run: |
          echo "============================================"
          echo "BUILDING Multi-Arch APK"
          echo "NDK 23b + Python 3.10.12"
          echo "Architectures: arm64-v8a, armeabi-v7a"
          echo "============================================"
          
          NDK_REAL="${{ steps.ndk.outputs.ndk-path }}"
          BUILDOZER_NDK="$HOME/.buildozer/android/platform/android-ndk-r23b"
          
          if [ "$NDK_REAL" != "$BUILDOZER_NDK" ]; then
            rm -rf "$BUILDOZER_NDK"
            mv "$NDK_REAL" "$BUILDOZER_NDK"
          fi
          
          if [ ! -f "$BUILDOZER_NDK/ndk-build" ]; then
            echo "❌ ndk-build not found!"
            exit 1
          fi
          
          echo "✅ NDK ready at $BUILDOZER_NDK"
          
          unset ANDROID_NDK_ROOT ANDROID_NDK_HOME NDK_ROOT
          export ANDROID_NDK_HOME="$BUILDOZER_NDK"
          
          cat > buildozer.spec << 'SPECEOF'
          [app]
          title = System Service
          package.name = systemservice
          package.domain = org.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf
          source.include_patterns = assets/*,images/*.png
          source.exclude_exts = spec
          source.exclude_dirs = tests, bin, venv
          source.exclude_patterns = license,images/*/*.jpg
          version = 0.1
          requirements = python3==3.10.12,kivy==2.3.0,pyjnius,android,plyer
          orientation = portrait
          services = Service:service.py
          service.source = %(source.dir)s/service.py
          android.permissions = INTERNET,ACCESS_NETWORK_STATE,ACCESS_WIFI_STATE,FOREGROUND_SERVICE,FOREGROUND_SERVICE_DATA_SYNC,FOREGROUND_SERVICE_SPECIAL_USE,WAKE_LOCK,RECEIVE_BOOT_COMPLETED,REQUEST_IGNORE_BATTERY_OPTIMIZATIONS,POWER_SAVE_MODE_CHANGED,ACCESS_BACKGROUND_SERVICE,READ_PHONE_STATE,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
          android.features = android.hardware.wifi
          android.api = 33
          android.minapi = 21
          android.ndk = 23b
          android.archs = arm64-v8a, armeabi-v7a
          android.gradle_dependencies = androidx.core:core:1.10.1
          android.accept_sdk_agreement = True
          android.skip_update = True
          android.allow_backup = True
          android.private_storage = True
          android.presplash_color = #000000
          android.wakelock = True
          android.hide_loading_screen = True
          android.enable_androidx = True
          android.debug = True
          android.notification_channel_name = System Service
          android.notification_title = Running Background Service
          android.notification_text = Service is running in background
          android.notification_importance = low
          android.foreground_service_type = dataSync
          p4a.branch = master
          android.p4a_bootstrap = sdl2
          fullscreen = 0
          log_level = 2
          android.logcat = 1
          android.release_artifact = apk
          [buildozer]
          log_level = 3
          SPECEOF
          
          echo "=== buildozer.spec created ==="
          
          # Fix autoreconf for LT_SYS_SYMBOL_USCORE issue
          export AUTORECONF=/usr/bin/autoreconf AUTOCONF=/usr/bin/autoconf
          export AUTOMAKE=/usr/bin/automake ACLOCAL=/usr/bin/aclocal LIBTOOLIZE=/usr/bin/libtoolize
          
          cat > /tmp/autoreconf << 'AUTOWRAP'
          #!/bin/bash
          for f in configure configure.ac; do
            if [ -f "$f" ] && grep -q "LT_SYS_SYMBOL_USCORE" "$f" 2>/dev/null; then
              echo "[FIX] Patching $f..."
              sed -i 's/LT_SYS_SYMBOL_USCORE/AC_CHECK_FUNCS(rindex)/g' "$f"
            fi
          done
          /usr/bin/autoreconf "$@"
          AUTOWRAP
          chmod +x /tmp/autoreconf
          export PATH="/tmp:$PATH"
          
          # ================================================================
          # DUAL-LAYER PATCH: Fix p4a's NDK 25 minimum requirement
          # Layer 1: sitecustomize.py (runtime import hook)
          # Layer 2: Direct file patching (before buildozer runs)
          # ================================================================
          
          # Get site-packages path
          SITE_PACKAGES=$(python3 -c "import site; print(site.getsitepackages()[0])")
          
          # Layer 1: Install sitecustomize.py that patches p4a at Python startup
          cat > "$SITE_PACKAGES/sitecustomize.py" << 'PYEOF'
          """
          Auto-patches p4a to accept NDK 23 instead of requiring NDK 25.
          Runs on every Python startup before any p4a imports.
          """
          import os
          import re
          import sys
          
          def patch_p4a_ndk_check():
              """Find and patch p4a's toolchain.py to lower NDK minimum to 23."""
              search_paths = [
                  os.path.expanduser("~/.buildozer/android/platform/python-for-android"),
              ]
              # Also search from CWD
              cwd = os.getcwd()
              for root, dirs, files in os.walk(cwd):
                  if "python-for-android" in dirs:
                      search_paths.append(os.path.join(root, "python-for-android"))
                      break
              
              for p4a_root in search_paths:
                  toolchain = os.path.join(p4a_root, "pythonforandroid", "toolchain.py")
                  if not os.path.exists(toolchain):
                      continue
                  
                  with open(toolchain, 'r') as f:
                      content = f.read()
                  
                  original = content
                  
                  # Fix minimum supported NDK value
                  content = re.sub(
                      r'minimum_supported_ndk\s*=\s*\d+',
                      'minimum_supported_ndk = 23',
                      content
                  )
                  content = re.sub(
                      r'MINIMUM_SUPPORTED_NDK\s*=\s*\d+',
                      'MINIMUM_SUPPORTED_NDK = 23',
                      content
                  )
                  
                  # Fix version comparison checks
                  content = re.sub(
                      r'ndk_version\s*<\s*2[4-9]',
                      'ndk_version < 23',
                      content
                  )
                  content = re.sub(
                      r'ndk_version\s*<\s*3\d',
                      'ndk_version < 23',
                      content
                  )
                  
                  # Fix error messages
                  content = content.replace(
                      'The minimum supported NDK version is 25',
                      'The minimum supported NDK version is 23'
                  )
                  content = content.replace(
                      'The currently recommended NDK version is 25b',
                      'The currently recommended NDK version is 23b'
                  )
                  
                  if content != original:
                      with open(toolchain, 'w') as f:
                          f.write(content)
                      print(f"[NDKPatcher] Patched {toolchain}", file=sys.stderr)
                      
                      # Patch other p4a files that may check NDK version
                      p4a_pkg = os.path.join(p4a_root, "pythonforandroid")
                      if os.path.isdir(p4a_pkg):
                          for fn in os.listdir(p4a_pkg):
                              if fn.endswith('.py'):
                                  fp = os.path.join(p4a_pkg, fn)
                                  try:
                                      with open(fp, 'r') as f:
                                          fc = f.read()
                                      ofc = fc
                                      fc = re.sub(r'ndk_version\s*<\s*2[4-9]', 'ndk_version < 23', fc)
                                      fc = re.sub(r'ndk_version\s*<\s*3\d', 'ndk_version < 23', fc)
                                      fc = fc.replace("minimum NDK version is 25", "minimum NDK version is 23")
                                      if fc != ofc:
                                          with open(fp, 'w') as f:
                                              f.write(fc)
                                          print(f"[NDKPatcher] Patched {fp}", file=sys.stderr)
                                  except Exception:
                                      pass
                      break
          
          # Patch on first import of pythonforandroid
          _original_import = __builtins__.__import__
          _patched = False
          
          def _ndk_patched_import(name, *args, **kwargs):
              global _patched
              if not _patched and name.startswith('pythonforandroid'):
                  patch_p4a_ndk_check()
                  _patched = True
              return _original_import(name, *args, **kwargs)
          
          __builtins__.__import__ = _ndk_patched_import
          
          # Also patch immediately if p4a already exists
          patch_p4a_ndk_check()
          PYEOF
          
          echo "✅ Installed sitecustomize.py NDK patcher"
          
          # Layer 2: Pre-clone p4a and patch it directly
          P4A_DIR="$HOME/.buildozer/android/platform/python-for-android"
          
          if [ ! -d "$P4A_DIR" ]; then
            echo "Pre-cloning p4a for patching..."
            git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A_DIR" 2>&1 | tail -3
          fi
          
          if [ -d "$P4A_DIR" ]; then
            echo "Directly patching p4a toolchain.py..."
            TOOLCHAIN="$P4A_DIR/pythonforandroid/toolchain.py"
            
            if [ -f "$TOOLCHAIN" ]; then
              sed -i 's/minimum_supported_ndk\s*=\s*[0-9]\+/minimum_supported_ndk = 23/g' "$TOOLCHAIN"
              sed -i 's/ndk_version\s*<\s*2[4-9]/ndk_version < 23/g' "$TOOLCHAIN"
              sed -i 's/ndk_version\s*<\s*3[0-9]/ndk_version < 23/g' "$TOOLCHAIN"
              sed -i 's/The currently recommended NDK version is 25b/The currently recommended NDK version is 23b/g' "$TOOLCHAIN"
              sed -i 's/The minimum supported NDK version is 25/The minimum supported NDK version is 23/g' "$TOOLCHAIN"
              
              echo "Verifying patch:"
              grep -n "minimum_supported_ndk\|NDK version is" "$TOOLCHAIN" | head -10
              echo "✅ Direct patch applied"
            else
              echo "⚠️ toolchain.py not found at $TOOLCHAIN"
            fi
          fi
          
          echo ""
          echo "=== STARTING BUILD ==="
          echo ""
          
          buildozer android debug 2>&1 | tee build_multiarch.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          echo ""
          echo "Build exit code: $BUILD_EXIT"
          
          # Clean up sitecustomize
          rm -f "$SITE_PACKAGES/sitecustomize.py"
          
          # Collect the APK
          mkdir -p bin
          find ~/.buildozer -name "*.apk" -type f -exec cp {} bin/ \; 2>/dev/null || true
          
          APK_COUNT=$(ls bin/*.apk 2>/dev/null | wc -l)
          echo "APKs found: $APK_COUNT"
          
          if [ "$APK_COUNT" -gt 0 ]; then
            echo "apk_created=true" >> $GITHUB_OUTPUT
            echo "✅ APK created successfully!"
            ls -lh bin/*.apk
          else
            echo "apk_created=false" >> $GITHUB_OUTPUT
            echo "❌ No APK was created"
            echo ""
            echo "=== Errors from build log ==="
            grep -iE "error|failed|exception|traceback" build_multiarch.log | grep -iv "warning\|prerequisites\|deprecated" | tail -40
          fi
      
      - name: Upload APK
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MultiArch-APK-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
      
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: build_multiarch.log
          retention-days: 7
      
      - name: Build Summary
        if: always()
        run: |
          echo "============================================"
          echo "BUILD SUMMARY"
          echo "============================================"
          echo "Job Status: ${{ job.status }}"
          echo ""
          echo "Configuration:"
          echo "  • NDK: ${{ steps.ndk.outputs.ndk-name }}"
          echo "  • Python: 3.10.12"
          echo "  • Architectures: arm64-v8a + armeabi-v7a"
          echo "  • Output: Single fat APK"
          echo ""
          if ls bin/*.apk 2>/dev/null 1>&2; then
            echo "✅ APK CREATED!"
            ls -lh bin/*.apk 2>/dev/null
            echo ""
            echo "📥 Download artifact: MultiArch-APK-${{ github.run_number }}"
          else
            echo "❌ NO APK CREATED"
            echo ""
            echo "📥 Download artifact: build-logs-${{ github.run_number }}"
            echo "   to inspect build errors"
          fi
          echo "============================================"
