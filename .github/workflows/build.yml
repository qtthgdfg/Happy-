name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (Multi-Arch)
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.12'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3-dev python3-pip \
            libffi-dev libssl-dev liblzma-dev \
            autoconf automake autotools-dev libtool libtool-bin \
            cmake pkg-config zip unzip wget curl \
            openjdk-17-jdk libncurses-dev libtinfo5 \
            libsqlite3-dev libreadline-dev libbz2-dev \
            libgdbm-dev zlib1g-dev
      
      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install "cython<3.0,>=0.29.33"
          python3 -m pip install buildozer==1.5.0 virtualenv
      
      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          
          mkdir -p cmdline-tools/latest
          if [ -d "cmdline-tools/bin" ]; then
            mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          fi
          
          mkdir -p tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/*
          
          mkdir -p licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > licenses/android-sdk-license
          
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            2>/dev/null || true
          
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
      
      # 🔑 Download and setup NDK 25b manually
      - name: Setup NDK 25b
        run: |
          echo "Downloading NDK 25b..."
          NDK_VERSION="25.2.9519653"
          NDK_ZIP="android-ndk-r25b-linux.zip"
          NDK_URL="https://dl.google.com/android/repository/${NDK_ZIP}"
          
          cd /tmp
          wget -q --show-progress "$NDK_URL" || curl -L -o "$NDK_ZIP" "$NDK_URL"
          
          echo "Extracting NDK..."
          unzip -q "$NDK_ZIP"
          rm "$NDK_ZIP"
          
          # Move to buildozer expected location
          BUILDOZER_NDK_DIR="$HOME/.buildozer/android/platform"
          mkdir -p "$BUILDOZER_NDK_DIR"
          
          # Remove old NDK if exists
          rm -rf "$BUILDOZER_NDK_DIR/android-ndk-r25b" 2>/dev/null || true
          
          # Move the extracted NDK
          mv android-ndk-r25b "$BUILDOZER_NDK_DIR/android-ndk-r25b"
          
          # Verify installation
          echo "NDK installed at: $BUILDOZER_NDK_DIR/android-ndk-r25b"
          if [ -f "$BUILDOZER_NDK_DIR/android-ndk-r25b/ndk-build" ]; then
            echo "✅ NDK 25b installed successfully!"
          else
            echo "❌ NDK installation failed!"
            exit 1
          fi
          
          # Set environment variable
          echo "ANDROID_NDK_HOME=$BUILDOZER_NDK_DIR/android-ndk-r25b" >> $GITHUB_ENV
      
      - name: Clean old buildozer cache
        run: |
          rm -rf ~/.buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf .buildozer 2>/dev/null || true
          echo "Cleaned old build cache"
      
      - name: Verify required files exist
        run: |
          echo "=== Checking required files ==="
          if [ -f "main.py" ]; then 
            echo "✅ main.py found ($(wc -l < main.py) lines)"
          else 
            echo "❌ main.py MISSING"
            exit 1
          fi
          if [ -f "service.py" ]; then 
            echo "✅ service.py found ($(wc -l < service.py) lines)"
          else 
            echo "❌ service.py MISSING"
            exit 1
          fi
          echo "=== Files in repository ==="
          ls -la
      
      # 🔑 BUILD 1: armeabi-v7a with NDK 25b + Python 3.10 (STABLE)
      - name: Build armeabi-v7a (NDK 25b + Python 3.10)
        run: |
          echo "============================================"
          echo "BUILDING armeabi-v7a with NDK 25b + Python 3.10"
          echo "============================================"
          
          # Create buildozer.spec for armeabi-v7a
          cat > buildozer_armeabi-v7a.spec << 'SPECEOF'
          [app]
          title = System Service
          package.name = systemservice
          package.domain = org.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf
          source.include_patterns = assets/*,images/*.png
          source.exclude_exts = spec
          source.exclude_dirs = tests, bin, venv
          source.exclude_patterns = license,images/*/*.jpg
          version = 0.1
          requirements = python3==3.10.12,kivy==2.3.0,pyjnius,android,plyer
          orientation = portrait
          services = Service:service.py
          service.source = %(source.dir)s/service.py
          android.permissions = INTERNET,ACCESS_NETWORK_STATE,ACCESS_WIFI_STATE,\
              FOREGROUND_SERVICE,FOREGROUND_SERVICE_DATA_SYNC,FOREGROUND_SERVICE_SPECIAL_USE,\
              WAKE_LOCK,RECEIVE_BOOT_COMPLETED,REQUEST_IGNORE_BATTERY_OPTIMIZATIONS,\
              POWER_SAVE_MODE_CHANGED,ACCESS_BACKGROUND_SERVICE,\
              READ_PHONE_STATE,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
          android.features = android.hardware.wifi
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.archs = armeabi-v7a
          android.gradle_dependencies = 'androidx.core:core:1.10.1'
          android.accept_sdk_agreement = True
          android.allow_backup = True
          android.private_storage = True
          android.presplash_color = #000000
          android.wakelock = True
          android.hide_loading_screen = True
          android.enable_androidx = True
          android.debug = True
          android.notification_channel_name = System Service
          android.notification_title = Running Background Service
          android.notification_text = Service is running in background
          android.notification_importance = low
          android.foreground_service_type = dataSync
          p4a.branch = master
          android.p4a_bootstrap = sdl2
          fullscreen = 0
          log_level = 2
          android.logcat = 1
          android.release_artifact = apk
          [buildozer]
          log_level = 2
          SPECEOF
          
          # Build
          export AUTORECONF=/usr/bin/autoreconf
          export AUTOCONF=/usr/bin/autoconf
          export AUTOMAKE=/usr/bin/automake
          export ACLOCAL=/usr/bin/aclocal
          export LIBTOOLIZE=/usr/bin/libtoolize
          
          cat > /tmp/autoreconf << 'AUTOWRAP'
          #!/bin/bash
          for f in configure configure.ac; do
            if [ -f "$f" ] && grep -q "LT_SYS_SYMBOL_USCORE" "$f" 2>/dev/null; then
              echo "[FIX] Patching $f..."
              sed -i 's/LT_SYS_SYMBOL_USCORE/AC_CHECK_FUNCS(rindex)/g' "$f"
            fi
          done
          /usr/bin/autoreconf "$@"
          AUTOWRAP
          chmod +x /tmp/autoreconf
          export PATH="/tmp:$PATH"
          
          buildozer --spec buildozer_armeabi-v7a.spec android debug 2>&1 | tee build_armeabi-v7a.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          echo "armeabi-v7a build exit code: $BUILD_EXIT"
          
          mkdir -p bin/armeabi-v7a
          find . -name "*.apk" -type f -exec cp {} bin/armeabi-v7a/ \; 2>/dev/null || true
          find ~/.buildozer -name "*.apk" -type f -exec cp {} bin/armeabi-v7a/ \; 2>/dev/null || true
          echo "armeabi-v7a APKs: $(ls bin/armeabi-v7a/*.apk 2>/dev/null | wc -l)"
          
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "⚠️ armeabi-v7a build failed, continuing..."
          fi
      
      # 🔑 Clean between builds to avoid conflicts
      - name: Clean build artifacts for next arch
        run: |
          echo "Cleaning build artifacts before arm64-v8a build..."
          rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf ~/.buildozer/android/platform/build-* 2>/dev/null || true
          echo "Cleaned"
      
      # 🔑 BUILD 2: arm64-v8a with NDK 25b + Python 3.10 (via develop branch)
      - name: Build arm64-v8a (NDK 25b + Python 3.10)
        run: |
          echo "============================================"
          echo "BUILDING arm64-v8a with NDK 25b + Python 3.10"
          echo "============================================"
          
          # Create buildozer.spec for arm64-v8a
          cat > buildozer_arm64-v8a.spec << 'SPECEOF'
          [app]
          title = System Service
          package.name = systemservice
          package.domain = org.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf
          source.include_patterns = assets/*,images/*.png
          source.exclude_exts = spec
          source.exclude_dirs = tests, bin, venv
          source.exclude_patterns = license,images/*/*.jpg
          version = 0.1
          requirements = python3==3.10.12,kivy==2.3.0,pyjnius,android,plyer
          orientation = portrait
          services = Service:service.py
          service.source = %(source.dir)s/service.py
          android.permissions = INTERNET,ACCESS_NETWORK_STATE,ACCESS_WIFI_STATE,\
              FOREGROUND_SERVICE,FOREGROUND_SERVICE_DATA_SYNC,FOREGROUND_SERVICE_SPECIAL_USE,\
              WAKE_LOCK,RECEIVE_BOOT_COMPLETED,REQUEST_IGNORE_BATTERY_OPTIMIZATIONS,\
              POWER_SAVE_MODE_CHANGED,ACCESS_BACKGROUND_SERVICE,\
              READ_PHONE_STATE,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
          android.features = android.hardware.wifi
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.archs = arm64-v8a
          android.gradle_dependencies = 'androidx.core:core:1.10.1'
          android.accept_sdk_agreement = True
          android.allow_backup = True
          android.private_storage = True
          android.presplash_color = #000000
          android.wakelock = True
          android.hide_loading_screen = True
          android.enable_androidx = True
          android.debug = True
          android.notification_channel_name = System Service
          android.notification_title = Running Background Service
          android.notification_text = Service is running in background
          android.notification_importance = low
          android.foreground_service_type = dataSync
          p4a.branch = develop
          android.p4a_bootstrap = sdl2
          fullscreen = 0
          log_level = 2
          android.logcat = 1
          android.release_artifact = apk
          [buildozer]
          log_level = 2
          SPECEOF
          
          # Build
          export AUTORECONF=/usr/bin/autoreconf
          export AUTOCONF=/usr/bin/autoconf
          export AUTOMAKE=/usr/bin/automake
          export ACLOCAL=/usr/bin/aclocal
          export LIBTOOLIZE=/usr/bin/libtoolize
          
          cat > /tmp/autoreconf << 'AUTOWRAP'
          #!/bin/bash
          for f in configure configure.ac; do
            if [ -f "$f" ] && grep -q "LT_SYS_SYMBOL_USCORE" "$f" 2>/dev/null; then
              echo "[FIX] Patching $f..."
              sed -i 's/LT_SYS_SYMBOL_USCORE/AC_CHECK_FUNCS(rindex)/g' "$f"
            fi
          done
          /usr/bin/autoreconf "$@"
          AUTOWRAP
          chmod +x /tmp/autoreconf
          export PATH="/tmp:$PATH"
          
          buildozer --spec buildozer_arm64-v8a.spec android debug 2>&1 | tee build_arm64-v8a.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          echo "arm64-v8a build exit code: $BUILD_EXIT"
          
          mkdir -p bin/arm64-v8a
          find . -name "*.apk" -type f -exec cp {} bin/arm64-v8a/ \; 2>/dev/null || true
          find ~/.buildozer -name "*.apk" -type f -exec cp {} bin/arm64-v8a/ \; 2>/dev/null || true
          echo "arm64-v8a APKs: $(ls bin/arm64-v8a/*.apk 2>/dev/null | wc -l)"
          
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "⚠️ arm64-v8a build failed, continuing..."
          fi
      
      # 🔑 COMBINE: Collect all APKs
      - name: Combine into fat APK
        id: build
        run: |
          echo "============================================"
          echo "COLLECTING APKs"
          echo "============================================"
          
          mkdir -p bin/combined
          
          ARMV7_COUNT=$(ls bin/armeabi-v7a/*.apk 2>/dev/null | wc -l)
          ARM64_COUNT=$(ls bin/arm64-v8a/*.apk 2>/dev/null | wc -l)
          
          echo "armeabi-v7a APKs: $ARMV7_COUNT"
          echo "arm64-v8a APKs: $ARM64_COUNT"
          
          if [ "$ARMV7_COUNT" -gt 0 ]; then
            cp bin/armeabi-v7a/*.apk bin/combined/ 2>/dev/null || true
            echo "✅ Copied armeabi-v7a APK(s)"
          fi
          
          if [ "$ARM64_COUNT" -gt 0 ]; then
            cp bin/arm64-v8a/*.apk bin/combined/ 2>/dev/null || true
            echo "✅ Copied arm64-v8a APK(s)"
          fi
          
          echo ""
          echo "=== Combined APKs ==="
          ls -lh bin/combined/ 2>/dev/null || echo "No APKs found"
          
          TOTAL=$(ls bin/combined/*.apk 2>/dev/null | wc -l)
          if [ "$TOTAL" -gt 0 ]; then
            echo "apk_created=true" >> $GITHUB_OUTPUT
            echo "✅ At least one APK created successfully!"
          else
            echo "apk_created=false" >> $GITHUB_OUTPUT
            echo "❌ No APKs were created"
          fi
      
      - name: Upload All APKs
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APKs-${{ github.run_number }}
          path: |
            bin/combined/*.apk
            bin/armeabi-v7a/*.apk
            bin/arm64-v8a/*.apk
          retention-days: 30
      
      - name: Upload Build Logs (ALWAYS)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            build_armeabi-v7a.log
            build_arm64-v8a.log
          retention-days: 7
      
      - name: Build Summary
        if: always()
        run: |
          echo "============================================"
          echo "BUILD SUMMARY"
          echo "============================================"
          echo "Job Status: ${{ job.status }}"
          echo ""
          echo "📦 armeabi-v7a (NDK 25b + Python 3.10):"
          echo "   $(ls bin/armeabi-v7a/*.apk 2>/dev/null | wc -l) APK(s)"
          echo ""
          echo "📦 arm64-v8a (NDK 25b + Python 3.10):"
          echo "   $(ls bin/arm64-v8a/*.apk 2>/dev/null | wc -l) APK(s)"
          echo ""
          if ls bin/combined/*.apk 2>/dev/null 1>&2; then
            echo "✅ APKs CREATED!"
            ls -lh bin/combined/*.apk 2>/dev/null
            echo ""
            echo "📥 Download artifact: Android-APKs-${{ github.run_number }}"
          else
            echo "❌ NO APKs CREATED"
            echo ""
            echo "📥 Download artifact: build-logs-${{ github.run_number }}"
            echo "   to inspect build errors"
          fi
          echo "============================================"
