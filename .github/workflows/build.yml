name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer and system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev zlib1g-dev libltdl-dev
          pip install --quiet buildozer "cython<3.0"

      - name: Setup Buildozer spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          sed -i 's/^android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          grep -q "android.accept_sdk_license" buildozer.spec || echo "android.accept_sdk_license = True" >> buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy,pyjnius,requests,cryptography,Pillow,android,psutil,opencv-python,numpy,schedule,PySocks,python-telegram-bot,cython<3.0/' buildozer.spec
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.api = 33" >> buildozer.spec

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "sdkman.auto.accept.licenses=true" > ~/.android/repositories.cfg

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: bin/*.apk
