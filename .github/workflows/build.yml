          done
          
          echo ""
          echo "=== STARTING BUILD ==="
          echo ""
          
          # Run buildozer but intercept the python3 it uses
          # by putting our wrapper first in PATH
          export PATH="/tmp:$PATH"
          # Temporarily symlink python3 to our wrapper for buildozer's subprocess calls
          # Actually, buildozer uses sys.executable which is the full path
          # We need a different approach...
          
          # Let's just run buildozer normally but with a pre-patched p4a
          # AND use a background watcher that patches whenever toolchain.py appears
          
          # Start a background watcher that patches p4a files as they appear
          bash -c '
          PATCH_SCRIPT() {
            while true; do
              for loc in "$HOME/.buildozer/android/platform/python-for-android" "$GITHUB_WORKSPACE/.buildozer/android/platform/python-for-android" /home/runner/work/*/*/.buildozer/android/platform/python-for-android; do
                TC="$loc/pythonforandroid/toolchain.py"
                if [ -f "$TC" ]; then
                  if grep -q "minimum_supported_ndk = 25" "$TC" 2>/dev/null; then
                    sed -i "s/minimum_supported_ndk = 25/minimum_supported_ndk = 23/g" "$TC"
                    sed -i "s/ndk_version < 25/ndk_version < 23/g" "$TC"
                    sed -i "s/ndk_version < 24/ndk_version < 23/g" "$TC"
                    echo "[WATCHER] Patched $TC at $(date +%H:%M:%S)" >> /tmp/patch_log.txt
                  fi
                fi
              done
              sleep 0.5
            done
          }
          PATCH_SCRIPT &
          WATCHER_PID=$!
          echo "Started p4a watcher (PID: $WATCHER_PID)"
          echo $WATCHER_PID > /tmp/watcher_pid.txt
          ' 2>&1
          
          # Run buildozer
          buildozer android debug 2>&1 | tee build_multiarch.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          # Kill the watcher
          if [ -f /tmp/watcher_pid.txt ]; then
            kill $(cat /tmp/watcher_pid.txt) 2>/dev/null || true
          fi
          
          echo ""
          echo "Build exit code: $BUILD_EXIT"
          echo ""
          if [ -f /tmp/patch_log.txt ]; then
            echo "=== Patch log ==="
            cat /tmp/patch_log.txt
          fi
          
          # Collect the APK
          mkdir -p bin
          find ~/.buildozer -name "*.apk" -type f -exec cp {} bin/ \; 2>/dev/null || true
          find "$GITHUB_WORKSPACE/.buildozer" -name "*.apk" -type f -exec cp {} bin/ \; 2>/dev/null || true
          
          APK_COUNT=$(ls bin/*.apk 2>/dev/null | wc -l)
          echo "APKs found: $APK_COUNT"
          
          if [ "$APK_COUNT" -gt 0 ]; then
            echo "apk_created=true" >> $GITHUB_OUTPUT
            echo "✅ APK created successfully!"
            ls -lh bin/*.apk
          else
            echo "apk_created=false" >> $GITHUB_OUTPUT
            echo "❌ No APK was created"
            echo ""
            echo "=== Errors from build log ==="
            grep -iE "error|failed|exception|traceback" build_multiarch.log | grep -iv "warning\|prerequisites\|deprecated\|experimental" | tail -40
          fi
