name: Build Kivy Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            python3-pip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            unzip \
            wget

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Generate buildozer.spec
        run: |
          IMPORTS=$(grep -E "^import |^from " main.py | sed 's/import //' | sed 's/from //' | cut -d' ' -f1 | sort -u)
          REQS="python3,android,openssl,libffi"
          for imp in $IMPORTS; do
            case $imp in
              requests) REQS="$REQS,requests,urllib3,chardet,idna,certifi" ;;
              flask) REQS="$REQS,flask" ;;
              numpy) REQS="$REQS,numpy" ;;
              pillow|PIL) REQS="$REQS,pillow" ;;
              sqlalchemy) REQS="$REQS,sqlalchemy" ;;
              kivy) REQS="$REQS,kivy" ;;
              kivymd) REQS="$REQS,kivymd" ;;
              plyer) REQS="$REQS,plyer" ;;
              socket|threading|time|os|json|sys|subprocess) REQS="$REQS" ;;
              *) REQS="$REQS,$imp" ;;
            esac
          done
          
          printf '[app]\n' > buildozer.spec
          printf 'title = System Service\n' >> buildozer.spec
          printf 'package.name = sysservice\n' >> buildozer.spec
          printf 'package.domain = org.test\n' >> buildozer.spec
          printf 'source.dir = .\n' >> buildozer.spec
          printf 'source.include_exts = py,png,jpg,kv,atlas\n' >> buildozer.spec
          printf 'version = 1.0\n' >> buildozer.spec
          printf 'requirements = %s\n' "$REQS" >> buildozer.spec
          printf 'orientation = portrait\n' >> buildozer.spec
          printf 'fullscreen = 0\n' >> buildozer.spec
          printf 'android.permissions = INTERNET\n' >> buildozer.spec
          printf 'android.api = 33\n' >> buildozer.spec
          printf 'android.minapi = 21\n' >> buildozer.spec
          printf 'android.ndk = 25b\n' >> buildozer.spec
          printf 'android.sdk = 33.0.0\n' >> buildozer.spec
          printf 'android.arch = arm64-v8a,armeabi-v7a\n' >> buildozer.spec
          printf 'android.allow_backup = True\n' >> buildozer.spec
          printf 'p4a.branch = master\n' >> buildozer.spec
          printf 'p4a.bootstrap = sdl2\n' >> buildozer.spec
          printf '\n' >> buildozer.spec
          printf '[buildozer]\n' >> buildozer.spec
          printf 'log_level = 2\n' >> buildozer.spec
          printf 'warn_on_root = 1\n' >> buildozer.spec
          
          echo "Generated buildozer.spec:"
          cat buildozer.spec

      - name: Build APK with Buildozer
        run: |
          mkdir -p ~/.android/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/licenses/android-sdk-license
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: bin/*.apk
