name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Select platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
          - android
          - ios

jobs:
  # ============================================
  # WINDOWS BUILD
  # ============================================
  build-windows:
    name: Build Windows (.exe)
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller kivy
          pip list
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name MyApp main.py
      
      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: Windows-exe-${{ github.run_number }}
          path: dist/MyApp.exe
          retention-days: 30
      
      - name: Build Summary
        run: |
          echo "============================================"
          echo "WINDOWS BUILD COMPLETE"
          echo "============================================"
          if (Test-Path dist/MyApp.exe) {
            echo "✅ Windows .exe created successfully!"
            Get-ChildItem dist/MyApp.exe
          } else {
            echo "❌ Windows build failed"
          }
          echo "============================================"

  # ============================================
  # LINUX BUILD
  # ============================================
  build-linux:
    name: Build Linux (AppImage)
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            python3-dev \
            python3-pip \
            libmtdev-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pyinstaller kivy
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name MyApp main.py
      
      - name: Upload Linux executable
        uses: actions/upload-artifact@v4
        with:
          name: Linux-binary-${{ github.run_number }}
          path: dist/MyApp
          retention-days: 30
      
      - name: Build Summary
        run: |
          echo "============================================"
          echo "LINUX BUILD COMPLETE"
          echo "============================================"
          if [ -f dist/MyApp ]; then
            echo "✅ Linux binary created successfully!"
            ls -lh dist/MyApp
          else
            echo "❌ Linux build failed"
          fi
          echo "============================================"

  # ============================================
  # macOS BUILD
  # ============================================
  build-macos:
    name: Build macOS (.app/.dmg)
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos'
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller kivy
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name MyApp main.py
      
      - name: Upload macOS executable
        uses: actions/upload-artifact@v4
        with:
          name: macOS-binary-${{ github.run_number }}
          path: dist/MyApp
          retention-days: 30
      
      - name: Build Summary
        run: |
          echo "============================================"
          echo "MACOS BUILD COMPLETE"
          echo "============================================"
          if [ -f dist/MyApp ]; then
            echo "✅ macOS binary created successfully!"
            ls -lh dist/MyApp
          else
            echo "❌ macOS build failed"
          fi
          echo "============================================"

  # ============================================
  # ANDROID BUILD (Your working workflow)
  # ============================================
  build-android:
    name: Build Android (APK)
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3-dev python3-pip \
            libffi-dev libssl-dev liblzma-dev \
            autoconf automake autotools-dev libtool libtool-bin \
            cmake pkg-config zip unzip wget curl \
            openjdk-17-jdk libncurses-dev libtinfo5 \
            libsqlite3-dev libreadline-dev libbz2-dev \
            libgdbm-dev zlib1g-dev
      
      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3.0" buildozer virtualenv
      
      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          if [ -d "cmdline-tools/bin" ]; then mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true; fi
          mkdir -p tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/*
          mkdir -p licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > licenses/android-sdk-license
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" "platforms;android-33" "build-tools;33.0.0" 2>/dev/null || true
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
      
      - name: Clean old buildozer cache
        run: |
          rm -rf ~/.buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf .buildozer 2>/dev/null || true
      
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-v11-${{ hashFiles('.github/workflows/build-all-platforms.yml') }}
          restore-keys: ${{ runner.os }}-buildozer-v11-
      
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'SPECEOF'
          [app]
          title = My App
          package.name = myapp
          package.domain = org.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,txt,json
          version = 1.0
          orientation = portrait
          fullscreen = 1
          android.permissions = INTERNET, ACCESS_NETWORK_STATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED, FOREGROUND_SERVICE, VIBRATE
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.archs = armeabi-v7a
          android.accept_sdk_agreement = True
          android.allow_backup = True
          android.private_storage = True
          android.presplash_color = #000000
          android.wakelock = True
          android.hide_loading_screen = True
          android.enable_androidx = True
          p4a.branch = develop
          android.p4a_bootstrap = sdl2
          android.debug = True
          requirements = python3,kivy,plyer,pyjnius
          [buildozer]
          log_level = 2
          warn_on_root = 1
          SPECEOF
      
      - name: Build APK
        id: build
        run: |
          export AUTORECONF=/usr/bin/autoreconf
          # Create patched autoreconf for libffi
          cat > /tmp/autoreconf << 'AUTOWRAP'
          #!/bin/bash
          for f in configure configure.ac; do
            if [ -f "$f" ] && grep -q "LT_SYS_SYMBOL_USCORE" "$f" 2>/dev/null; then
              sed -i 's/LT_SYS_SYMBOL_USCORE/AC_CHECK_FUNCS(rindex)/g' "$f"
            fi
          done
          /usr/bin/autoreconf "$@"
          AUTOWRAP
          chmod +x /tmp/autoreconf
          export PATH="/tmp:$PATH"
          buildozer android debug 2>&1 | tee full_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "apk_created=true" >> $GITHUB_OUTPUT
          else
            echo "apk_created=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload APK
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-build-log-${{ github.run_number }}
          path: full_build.log
          retention-days: 7

  # ============================================
  # iOS BUILD
  # ============================================
  build-ios:
    name: Build iOS (.ipa)
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          brew install pkg-config sdl2 sdl2_image sdl2_ttf sdl2_mixer
          pip install --upgrade pip setuptools wheel
          pip install kivy-ios cython
      
      - name: Build with Kivy-iOS
        run: |
          # Create basic toolchain
          toolchain build kivy
          toolchain build ios
          # Create Xcode project
          toolchain create MyApp ./main.py
      
      - name: Upload iOS project
        uses: actions/upload-artifact@v4
        with:
          name: iOS-project-${{ github.run_number }}
          path: MyApp-ios/
          retention-days: 30
      
      - name: Build Summary
        run: |
          echo "============================================"
          echo "iOS BUILD COMPLETE"
          echo "============================================"
          if [ -d "MyApp-ios" ]; then
            echo "✅ iOS project created!"
            echo "Open in Xcode to build .ipa"
          else
            echo "❌ iOS build failed"
          fi
          echo "============================================"

  # ============================================
  # RELEASE (creates GitHub Release with all builds)
  # ============================================
  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [build-windows, build-linux, build-macos, build-android, build-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-builds
      
      - name: List all files
        run: |
          echo "All built files:"
          find all-builds -type f -exec ls -lh {} \;
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Build ${{ github.run_number }} - All Platforms
          tag_name: v${{ github.run_number }}
          files: all-builds/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 Multi-Platform Build
            
            **Build Number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}
            
            ### 📦 Included Builds:
            - 🪟 Windows (.exe)
            - 🐧 Linux (binary)
            - 🍎 macOS (binary)
            - 📱 Android (APK)
            - 📱 iOS (Xcode project)
            
            ### 📝 Installation:
            - **Windows:** Download and run `MyApp.exe`
            - **Linux:** `chmod +x MyApp && ./MyApp`
            - **macOS:** Right-click → Open (to bypass Gatekeeper)
            - **Android:** Transfer APK to phone and install
            - **iOS:** Open in Xcode and build to device
            
            ---
            *Built automatically by GitHub Actions*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
