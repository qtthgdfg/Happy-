name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.12'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            git \
            python3-dev \
            python3-pip \
            libffi-dev \
            libssl-dev \
            liblzma-dev \
            autoconf \
            automake \
            autotools-dev \
            libtool \
            libtool-bin \
            cmake \
            pkg-config \
            zip \
            unzip \
            wget \
            curl \
            openjdk-17-jdk \
            libncurses-dev \
            libtinfo5 \
            libsqlite3-dev \
            libreadline-dev \
            libbz2-dev \
            libgdbm-dev \
            zlib1g-dev
      
      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install "cython<3.0,>=0.29.33"
          python3 -m pip install buildozer==1.5.0 virtualenv
          # 🔑 Install python-for-android explicitly so we can patch it
          python3 -m pip install python-for-android
      
      - name: Verify Python version
        run: |
          echo "System Python: $(python3 --version)"
          echo "Python path: $(which python3)"
          python3 -c "import sys; assert sys.version_info[:2] == (3, 10), f'Wrong Python version: {sys.version}'" || exit 1
      
      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          
          mkdir -p cmdline-tools/latest
          if [ -d "cmdline-tools/bin" ]; then
            mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          fi
          
          mkdir -p tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/*
          
          mkdir -p licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > licenses/android-sdk-license
          
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            2>/dev/null || true
          
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
      
      - name: Clean old buildozer cache
        run: |
          rm -rf ~/.buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf .buildozer 2>/dev/null || true
          echo "Cleaned old build cache"
      
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-v20-${{ hashFiles('buildozer.spec', 'main.py', 'service.py') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v20-
      
      - name: Verify required files exist
        run: |
          echo "=== Checking required files ==="
          if [ -f "main.py" ]; then 
            echo "✅ main.py found ($(wc -l < main.py) lines)"
          else 
            echo "❌ main.py MISSING"
            exit 1
          fi
          if [ -f "service.py" ]; then 
            echo "✅ service.py found ($(wc -l < service.py) lines)"
          else 
            echo "❌ service.py MISSING"
            exit 1
          fi
          echo "=== Files in repository ==="
          ls -la
      
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'SPECEOF'
          [app]

          title = System Service
          package.name = systemservice
          package.domain = org.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf
          source.include_patterns = assets/*,images/*.png
          source.exclude_exts = spec
          source.exclude_dirs = tests, bin, venv
          source.exclude_patterns = license,images/*/*.jpg
          version = 0.1
          # 🔑 Only use package names, no version pins for python3
          requirements = python3,kivy,pyjnius,android,plyer
          orientation = portrait
          services = Service:service.py
          service.source = %(source.dir)s/service.py
          android.permissions = INTERNET,ACCESS_NETWORK_STATE,ACCESS_WIFI_STATE,\
              FOREGROUND_SERVICE,FOREGROUND_SERVICE_DATA_SYNC,FOREGROUND_SERVICE_SPECIAL_USE,\
              WAKE_LOCK,RECEIVE_BOOT_COMPLETED,REQUEST_IGNORE_BATTERY_OPTIMIZATIONS,\
              POWER_SAVE_MODE_CHANGED,ACCESS_BACKGROUND_SERVICE,\
              READ_PHONE_STATE,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
          android.features = android.hardware.wifi
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.gradle_dependencies = 'androidx.core:core:1.10.1'
          android.archs = arm64-v8a, armeabi-v7a
          android.accept_sdk_agreement = True
          android.allow_backup = True
          android.private_storage = True
          android.presplash_color = #000000
          android.wakelock = True
          android.hide_loading_screen = True
          android.enable_androidx = True
          android.debug = True
          android.notification_channel_name = System Service
          android.notification_title = Running Background Service
          android.notification_text = Service is running in background
          android.notification_importance = low
          android.foreground_service_type = dataSync
          
          # 🔑 CRITICAL: develop branch needed for NDK 25b support
          p4a.branch = develop
          
          # 🔑 Set Python version (monkey-patch will enforce this)
          p4a.python_version = 3.10.12
          
          android.p4a_bootstrap = sdl2
          fullscreen = 0
          log_level = 2
          android.logcat = 1
          android.release_artifact = apk

          [buildozer]
          log_level = 2
          SPECEOF
          
          echo "✅ buildozer.spec created:"
          cat buildozer.spec
      
      # 🔑🔑🔑 MONKEY-PATCH: Force p4a to use Python 3.10 instead of Python 3.14 🔑🔑🔑
      - name: Monkey-patch p4a to force Python 3.10 (NOT 3.14)
        run: |
          echo "============================================"
          echo "🔧 MONKEY-PATCHING PYTHON-FOR-ANDROID"
          echo "============================================"
          
          # Find the p4a installation directory
          P4A_DIR=$(python3 -c "import os, pythonforandroid; print(os.path.dirname(pythonforandroid.__file__))")
          echo "📁 p4a directory: $P4A_DIR"
          
          # Count files that reference 3.14 before patching
          echo ""
          echo "📊 BEFORE PATCHING:"
          BEFORE_COUNT=$(grep -rl "3\.14" $P4A_DIR --include="*.py" 2>/dev/null | wc -l)
          echo "   Files containing '3.14': $BEFORE_COUNT"
          if [ "$BEFORE_COUNT" -gt 0 ]; then
            echo "   Files:"
            grep -rl "3\.14" $P4A_DIR --include="*.py" 2>/dev/null | head -10
          fi
          
          echo ""
          echo "🔨 PATCHING..."
          
          # Step 1: Replace specific version 3.14.2 → 3.10.12
          echo "   → Replacing '3.14.2' with '3.10.12'..."
          find $P4A_DIR -type f -name "*.py" -exec sed -i 's/3\.14\.2/3.10.12/g' {} +
          
          # Step 2: Replace general version 3.14 → 3.10
          echo "   → Replacing '3.14' with '3.10'..."
          find $P4A_DIR -type f -name "*.py" -exec sed -i 's/3\.14/3.10/g' {} +
          
          # Step 3: Also patch any .patch files or other text files
          echo "   → Patching additional files..."
          find $P4A_DIR -type f \( -name "*.patch" -o -name "*.txt" -o -name "*.cfg" -o -name "*.ini" \) -exec sed -i 's/3\.14\.2/3.10.12/g' {} + 2>/dev/null || true
          find $P4A_DIR -type f \( -name "*.patch" -o -name "*.txt" -o -name "*.cfg" -o -name "*.ini" \) -exec sed -i 's/3\.14/3.10/g' {} + 2>/dev/null || true
          
          # Step 4: Patch toolchain.py to change default Python version
          TOOLCHAIN_FILE="$P4A_DIR/toolchain.py"
          if [ -f "$TOOLCHAIN_FILE" ]; then
            echo "   → Patching toolchain.py defaults..."
            sed -i "s/DEFAULT_PYTHON_VERSION = '3\.14'/DEFAULT_PYTHON_VERSION = '3.10'/g" $TOOLCHAIN_FILE
            sed -i 's/DEFAULT_PYTHON_VERSION = "3\.14"/DEFAULT_PYTHON_VERSION = "3.10"/g' $TOOLCHAIN_FILE
            sed -i "s/DEFAULT_PYTHON_VERSION = '3\.14\.2'/DEFAULT_PYTHON_VERSION = '3.10.12'/g" $TOOLCHAIN_FILE
            sed -i 's/DEFAULT_PYTHON_VERSION = "3\.14\.2"/DEFAULT_PYTHON_VERSION = "3.10.12"/g' $TOOLCHAIN_FILE
            echo "   ✅ toolchain.py patched"
          fi
          
          # Step 5: Patch python3 recipe
          PYTHON_RECIPE="$P4A_DIR/recipes/python3/__init__.py"
          if [ -f "$PYTHON_RECIPE" ]; then
            echo "   → Patching python3 recipe ($PYTHON_RECIPE)..."
            sed -i 's/version = "3\.14\.2"/version = "3.10.12"/g' $PYTHON_RECIPE
            sed -i "s/version = '3\.14\.2'/version = '3.10.12'/g" $PYTHON_RECIPE
            sed -i 's|url = "https://www.python.org/ftp/python/3.14.2/Python-3.14.2.tgz"|url = "https://www.python.org/ftp/python/3.10.12/Python-3.10.12.tgz"|g' $PYTHON_RECIPE
            echo "   ✅ python3 recipe patched"
          fi
          
          # Step 6: Patch hostpython3 recipe
          HOSTPYTHON_RECIPE="$P4A_DIR/recipes/hostpython3/__init__.py"
          if [ -f "$HOSTPYTHON_RECIPE" ]; then
            echo "   → Patching hostpython3 recipe ($HOSTPYTHON_RECIPE)..."
            sed -i 's/version = "3\.14\.2"/version = "3.10.12"/g' $HOSTPYTHON_RECIPE
            sed -i "s/version = '3\.14\.2'/version = '3.10.12'/g" $HOSTPYTHON_RECIPE
            sed -i 's|url = "https://www.python.org/ftp/python/3.14.2/Python-3.14.2.tgz"|url = "https://www.python.org/ftp/python/3.10.12/Python-3.10.12.tgz"|g' $HOSTPYTHON_RECIPE
            echo "   ✅ hostpython3 recipe patched"
          fi
          
          # Step 7: Patch any bootstrap files
          echo "   → Patching bootstrap files..."
          find $P4A_DIR -type f -name "*.py" -path "*/bootstrap/*" -exec sed -i 's/3\.14\.2/3.10.12/g' {} + 2>/dev/null || true
          find $P4A_DIR -type f -name "*.py" -path "*/bootstrap/*" -exec sed -i 's/3\.14/3.10/g' {} + 2>/dev/null || true
          
          echo ""
          echo "📊 AFTER PATCHING:"
          AFTER_COUNT=$(grep -rl "3\.14" $P4A_DIR --include="*.py" 2>/dev/null | wc -l)
          echo "   Files containing '3.14': $AFTER_COUNT"
          
          if [ "$AFTER_COUNT" -gt 0 ]; then
            echo "   ⚠️  Warning: $AFTER_COUNT files still contain 3.14 references:"
            grep -rl "3\.14" $P4A_DIR --include="*.py" 2>/dev/null
          else
            echo "   ✅ All 3.14 references SUCCESSFULLY replaced with 3.10!"
          fi
          
          # Verify patches were applied correctly
          echo ""
          echo "🔍 VERIFICATION:"
          echo "   Checking for 3.10.12 references..."
          python3 -c "
          import os
          p4a_dir = os.path.dirname(__import__('pythonforandroid').__file__)
          count_310 = 0
          for root, dirs, files in os.walk(p4a_dir):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fp:
                              content = fp.read()
                              if '3.10.12' in content:
                                  count_310 += 1
                      except:
                          pass
          print(f'   ✅ Found 3.10.12 references in {count_310} files')
          " || echo "   ⚠️  Verification failed, but continuing..."
          
          echo ""
          echo "✅ Monkey-patching COMPLETE!"
          echo "============================================"
      
      - name: Build APK
        id: build
        run: |
          echo "Starting build on $(lsb_release -ds)..."
          echo "Python version: $(python3 --version)"
          echo "Java version: $(java -version 2>&1 | head -1)"
          
          # Force Python 3.10 environment variables
          export P4A_PYTHON_VERSION=3.10.12
          export PYTHON_VERSION=3.10.12
          export HOSTPYTHON_VERSION=3.10.12
          
          # Create wrapper to ensure we use the correct Python
          mkdir -p $HOME/local/bin
          cat > $HOME/local/bin/python3 << 'PYWRAP'
          #!/bin/bash
          exec /opt/hostedtoolcache/Python/3.10.12/x64/bin/python3 "$@"
          PYWRAP
          chmod +x $HOME/local/bin/python3
          export PATH="$HOME/local/bin:$PATH"
          
          # Verify the correct Python is being used
          echo "=== Python Verification ==="
          which python3
          python3 --version
          python3 -c "import sys; print(f'Python {sys.version}')"
          
          # Build tools setup
          export AUTORECONF=/usr/bin/autoreconf
          export AUTOCONF=/usr/bin/autoconf
          export AUTOMAKE=/usr/bin/automake
          export ACLOCAL=/usr/bin/aclocal
          export LIBTOOLIZE=/usr/bin/libtoolize
          
          # Create patched autoreconf for libffi
          cat > /tmp/autoreconf << 'AUTOWRAP'
          #!/bin/bash
          for f in configure configure.ac; do
            if [ -f "$f" ] && grep -q "LT_SYS_SYMBOL_USCORE" "$f" 2>/dev/null; then
              echo "[FIX] Patching $f..."
              sed -i 's/LT_SYS_SYMBOL_USCORE/AC_CHECK_FUNCS(rindex)/g' "$f"
            fi
          done
          /usr/bin/autoreconf "$@"
          AUTOWRAP
          chmod +x /tmp/autoreconf
          export PATH="/tmp:$PATH"
          
          # Run buildozer
          echo "=== Starting buildozer ==="
          buildozer android debug 2>&1 | tee full_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          echo ""
          echo "Build exit code: $BUILD_EXIT"
          
          # Create output directory
          mkdir -p bin
          
          # Find and copy APK
          APK_FOUND=false
          echo "=== Searching for APK files ==="
          
          for search_dir in \
            ~/.buildozer/android/platform/build-*/dists/*/bin/ \
            ~/.buildozer/android/platform/build-*/dists/*/ \
            bin/ \
            ./
          do
            if ls "$search_dir"*.apk 2>/dev/null 1>&2; then
              for apk in "$search_dir"*.apk; do
                if [ -f "$apk" ]; then
                  echo "Found: $apk ($(du -h "$apk" | cut -f1))"
                  cp "$apk" bin/
                  APK_FOUND=true
                fi
              done
            fi
          done
          
          # Deep search for APK
          if [ "$APK_FOUND" = false ]; then
            for apk in $(find /home/runner -name "*.apk" -type f 2>/dev/null); do
              echo "Found: $apk ($(du -h "$apk" | cut -f1))"
              cp "$apk" bin/
              APK_FOUND=true
            done
          fi
          
          if [ "$APK_FOUND" = true ]; then
            echo ""
            echo "✅ APK FOUND!"
            ls -lh bin/*.apk
            echo "apk_created=true" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "❌ No APK found"
            echo ""
            echo "=== Critical errors from build ==="
            grep -i "error:" full_build.log | grep -v "WARNING\|DEPRECATED\|stty\|checking\|Cythonize\|autoreconf\|warning:\|config.pxi\|Could not find\|No matching distribution" | tail -20
            echo "apk_created=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload APK
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-${{ github.run_number }}
          path: |
            bin/*.apk
          retention-days: 30
      
      - name: Upload build log (ALWAYS)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: |
            full_build.log
          retention-days: 7
      
      - name: Build Summary
        if: always()
        run: |
          echo "============================================"
          echo "BUILD SUMMARY"
          echo "============================================"
          echo "Job Status: ${{ job.status }}"
          echo ""
          if ls bin/*.apk 2>/dev/null 1>&2; then
            echo "✅ APK SUCCESSFULLY CREATED!"
            ls -lh bin/*.apk 2>/dev/null
            echo ""
            echo "📥 Download artifact: Android-APK-${{ github.run_number }}"
          else
            echo "❌ NO APK CREATED"
            echo ""
            echo "📥 Download artifact: build-log-${{ github.run_number }}"
            echo "   to inspect build errors"
          fi
          echo "============================================"
