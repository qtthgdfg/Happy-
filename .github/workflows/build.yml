name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-dev \
            build-essential \
            autoconf \
            automake \
            libtool \
            libffi-dev \
            libssl-dev \
            zip \
            unzip \
            openjdk-17-jdk

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Generate buildozer.spec
        run: |
          cat << 'EOF' > buildozer.spec
          [app]
          title = System Service
          package.name = sysservice
          package.domain = com.system.service
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas
          version = 0.1
          requirements = python3,android
          orientation = portrait
          osx.python_version = 3
          osx.kivy_version = 2.2.1
          fullscreen = 0
          android.permissions = INTERNET,FOREGROUND_SERVICE,WAKE_LOCK,RECEIVE_BOOT_COMPLETED,ACCESS_NETWORK_STATE,ACCESS_WIFI_STATE,READ_PHONE_STATE,READ_EXTERNAL_STORAGE
          android.api = 31
          android.minapi = 26
          android.ndk = 23b
          android.sdk = 31
          android.arch = arm64-v8a
          android.foreground_service_type = dataSync
          android.entrypoint = myservice.py
          android.wakelock = True
          p4a.branch = develop
          log_level = 2
          warn_on_root = 1
          EOF

      - name: Set Android SDK root and accept licenses
        run: |
          export ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > $ANDROID_SDK_ROOT/licenses/intel-android-extra-license

      - name: Build APK with Buildozer
        run: |
          export ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
          buildozer android debug 2>&1 | tee build.log

      - name: Debug build failure
        if: failure()
        run: cat build.log | tail -100

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
